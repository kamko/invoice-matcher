name: Deploy Production

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]

jobs:
  deploy-production:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'

    runs-on: ubuntu-latest

    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Patch Coolify Docker image tag
        env:
          COOLIFY_API_BASE_URL: ${{ secrets.COOLIFY_API_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APPLICATION_UUID: ${{ secrets.COOLIFY_APPLICATION_UUID }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          curl --silent --show-error --fail-with-body \
            --request PATCH \
            --url "${COOLIFY_API_BASE_URL%/}/applications/${COOLIFY_APPLICATION_UUID}" \
            --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{\"docker_registry_image_tag\":\"${IMAGE_TAG}\"}"

      - name: Deploy Coolify application
        env:
          COOLIFY_API_BASE_URL: ${{ secrets.COOLIFY_API_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APPLICATION_UUID: ${{ secrets.COOLIFY_APPLICATION_UUID }}
        run: |
          curl --silent --show-error --fail-with-body \
            --request GET \
            --url "${COOLIFY_API_BASE_URL%/}/deploy?uuid=${COOLIFY_APPLICATION_UUID}" \
            --header "Authorization: Bearer ${COOLIFY_TOKEN}"
