services:
  invoice-matcher:
    image: ghcr.io/kamko/invoice-matcher:master
    ports:
      - "8000:8000"
    volumes:
      - invoice-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_AUTH_REDIRECT_URI=${GOOGLE_AUTH_REDIRECT_URI}
      - SECRET_KEY=${SECRET_KEY}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS}
      - ALLOWED_EMAIL_ADDRESSES=${ALLOWED_EMAIL_ADDRESSES}
      - ALLOWED_EMAIL_DOMAINS=${ALLOWED_EMAIL_DOMAINS}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-2.0-flash-001}
    restart: unless-stopped

volumes:
  invoice-data:
